# Redis configuration for development

# Port
port 6379

# Bind to all interfaces
bind 0.0.0.0

# Memory management
# Note: vm.overcommit_memory should be set on host:
# sysctl vm.overcommit_memory=1
maxmemory-policy allkeys-lru

# Logging
loglevel notice

# Disable persistence for development (faster)
# Also disables background saves that require vm.overcommit_memory
save ""
appendonly no
stop-writes-on-bgsave-error no

# Allow any clients to connect in development
requirepass ""
