name: Deploy

on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/planner

jobs:
  build:
    name: Build and push ${{ matrix.component }} image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - component: api
            dockerfile: .docker/api/Dockerfile
          - component: app
            dockerfile: .docker/app/Dockerfile
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.component }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.component }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  scan:
    name: Scan ${{ matrix.component }} image
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        component: [api, app]
    steps:
      - uses: actions/checkout@v5

      - uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          scan-type: 'image'
          scan-ref: '${{ env.IMAGE_PREFIX }}-${{ matrix.component }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-${{ matrix.component }}.sarif'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.component }}.sarif'
          category: container-scan-${{ matrix.component }}

  deploy:
    name: Deploy to VPS
    needs: scan
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Pull images and restart stack
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o StrictHostKeyChecking=yes \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
              "set -euo pipefail && \
               cd /p/projects/planner && \
               git pull --ff-only && \
               export IMAGE_TAG=${{ github.sha }} && \
               export CORS_ORIGIN=https://planner.thiagobraga.dev && \
               docker compose -f compose.prod.yml pull && \
               docker compose -f compose.prod.yml up -d && \
               docker image prune -f"

      - name: Verify service is up
        run: |
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w '%{http_code}' https://planner.thiagobraga.dev/ || true)
            if [ "$code" = "200" ]; then
              echo "Deploy verified (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $code, retrying in 10s"
            sleep 10
          done
          echo "Service did not return HTTP 200 after deploy"
          exit 1

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
