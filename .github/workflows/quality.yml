name: Quality

on:
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  api:
    name: API — lint, test, build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: planner
          POSTGRES_PASSWORD: planner-test
          POSTGRES_DB: planner_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
        env:
          DATABASE_URL: postgres://planner:planner-test@localhost:5432/planner_test
          REDIS_URL: redis://localhost:6379
          CORS_ORIGIN: http://localhost:5173
          CSRF_SECRET: test-csrf-secret-not-for-production
          NODE_ENV: test
      - run: npm run build
        env:
          NODE_ENV: production

  app:
    name: App — lint, test, build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  docker:
    name: Docker — build production images
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - run: |
          export CORS_ORIGIN=https://planner.thiagobraga.dev
          docker compose -f compose.prod.yml build
