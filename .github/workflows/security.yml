name: Security

on:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        package: [api, app]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.package }}/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: +security-and-quality
      - uses: github/codeql-action/analyze@v4

  secrets:
    name: Secret scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'repo'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-secrets.sarif'
          scanners: 'secret'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-secrets.sarif
          category: secret-scan

  docker:
    name: Docker build check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - run: |
          export CORS_ORIGIN=https://planner.thiagobraga.dev
          docker compose -f compose.prod.yml build

  # Container vulnerability scanning lives in deploy.yml, where it scans the
  # exact image digests pushed to GHCR rather than a locally-tagged rebuild.

  sbom:
    name: SBOM generation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'repo'
          scan-ref: '.'
          format: 'spdx-json'
          output: 'sbom.spdx.json'
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90
