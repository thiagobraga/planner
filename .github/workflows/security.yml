name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # every Monday 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        package: [api, app]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.package }}/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: +security-and-quality
      - uses: github/codeql-action/analyze@v3

  secrets:
    name: Secret scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'repo'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-secrets.sarif'
          scanners: 'secrets'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-secrets.sarif
          category: secret-scan

  docker:
    name: Docker build check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: docker buildx build --check
      - run: docker compose -f compose.prod.yml build

  container-scan:
    name: Container vulnerability scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f compose.prod.yml build
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          scan-ref: 'docker.io/library/planner-api:latest'
          format: 'sarif'
          output: 'trivy-container.sarif'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-container.sarif
          category: container-scan

  sbom:
    name: SBOM generation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'repo'
          scan-ref: '.'
          format: 'spdx-json'
          output: 'sbom.spdx.json'
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90
