services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-planner}
      POSTGRES_DB: ${POSTGRES_DB:-planner}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-planner}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Dev-only database admin UI, reachable at db.planner.local. Logs in without a
  # master password (desktop mode) and auto-registers the Planner server.
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@planner.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin:/var/lib/pgadmin
      - ./.docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks: [default, proxy]
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      traefik.enable: true
      traefik.http.routers.planner-pgadmin-router.rule: Host(`db.planner.local`)
      traefik.http.routers.planner-pgadmin-router.entrypoints: websecure
      traefik.http.routers.planner-pgadmin-router.tls: true
      traefik.http.services.planner-pgadmin-service.loadbalancer.server.port: 80

  api:
    build:
      context: .
      dockerfile: .docker/api/Dockerfile
    ports:
      - "4040:4000"
    networks: [default, proxy]
    environment:
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-planner}:${POSTGRES_PASSWORD:-planner}@postgres:5432/${POSTGRES_DB:-planner}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://planner.local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      traefik.enable: true
      traefik.http.routers.planner-api-router.rule: Host(`planner.local`) && PathPrefix(`/api`)
      traefik.http.routers.planner-api-router.entrypoints: websecure
      traefik.http.routers.planner-api-router.tls: true
      traefik.http.routers.planner-api-router.priority: 100
      traefik.http.services.planner-api-service.loadbalancer.server.port: 4000
      traefik.http.routers.planner-socketio-router.rule: Host(`planner.local`) && PathPrefix(`/socket.io`)
      traefik.http.routers.planner-socketio-router.entrypoints: websecure
      traefik.http.routers.planner-socketio-router.tls: true
      traefik.http.routers.planner-socketio-router.priority: 200
      traefik.http.routers.planner-socketio-router.service: planner-api-service
      # Subdomain access: api.planner.local serves the whole API
      traefik.http.routers.planner-api-host-router.rule: Host(`api.planner.local`)
      traefik.http.routers.planner-api-host-router.entrypoints: websecure
      traefik.http.routers.planner-api-host-router.tls: true
      traefik.http.routers.planner-api-host-router.service: planner-api-service

  app:
    build:
      context: .
      dockerfile: .docker/app/Dockerfile
    ports:
      - "50173:5173"
    networks: [default, proxy]
    environment:
      VITE_API_URL: http://api:4000
    volumes:
      - ./app/src:/app/app/src
      - ./app/index.html:/app/app/index.html
    depends_on:
      - api
    labels:
      traefik.enable: true
      traefik.http.routers.planner-app-router.rule: Host(`planner.local`)
      traefik.http.routers.planner-app-router.entrypoints: websecure
      traefik.http.routers.planner-app-router.tls: true
      traefik.http.services.planner-app-service.loadbalancer.server.port: 5173

volumes:
  pgdata:
  pgadmin:

networks:
  proxy:
    external: true
