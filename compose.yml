services:
  app:
    build:
      context: .
      dockerfile: .docker/app/Dockerfile
      target: development
    container_name: planner-app
    networks: [default, proxy]
    volumes: [./app:/app]
    environment:
      VITE_API_URL: http://api:4000
    depends_on: [api]
    labels:
      traefik.enable: true
      traefik.http.routers.planner-app-router.rule: Host(`planner.local`)
      traefik.http.routers.planner-app-router.entrypoints: websecure
      traefik.http.routers.planner-app-router.tls: true
      traefik.http.services.planner-app-service.loadbalancer.server.port: 5173

  api:
    build:
      context: .
      dockerfile: .docker/api/Dockerfile
      target: development
    container_name: planner-api
    networks: [default, proxy]
    volumes: [./api:/app]
    environment:
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-planner}:${POSTGRES_PASSWORD:-planner}@postgres:5432/${POSTGRES_DB:-planner}
      REDIS_URL: redis://:${REDIS_PASSWORD:-planner}@redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-https://planner.local}
      # Unset by default: the API logs password reset links to its own console
      # instead of sending mail, so the flow works with no Resend account.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@planner.local}
      # Defaults match the API's own production values; override in .env for a
      # local session that outlives a long debugging session.
      SESSION_IDLE_TTL_MINUTES: ${SESSION_IDLE_TTL_MINUTES:-30}
      SESSION_ABSOLUTE_TTL_HOURS: ${SESSION_ABSOLUTE_TTL_HOURS:-12}
    ulimits:
      nofile: 65536
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      traefik.enable: true
      traefik.http.routers.planner-api-router.rule: Host(`planner.local`) && PathPrefix(`/api`)
      traefik.http.routers.planner-api-router.entrypoints: websecure
      traefik.http.routers.planner-api-router.tls: true
      traefik.http.routers.planner-api-router.priority: 100
      traefik.http.services.planner-api-service.loadbalancer.server.port: 4000
      traefik.http.routers.planner-socketio-router.rule: Host(`planner.local`) && PathPrefix(`/socket.io`)
      traefik.http.routers.planner-socketio-router.entrypoints: websecure
      traefik.http.routers.planner-socketio-router.tls: true
      traefik.http.routers.planner-socketio-router.priority: 200
      traefik.http.routers.planner-socketio-router.service: planner-api-service
      # Subdomain access: api.planner.local serves the whole API
      traefik.http.routers.planner-api-host-router.rule: Host(`api.planner.local`)
      traefik.http.routers.planner-api-host-router.entrypoints: websecure
      traefik.http.routers.planner-api-host-router.tls: true
      traefik.http.routers.planner-api-host-router.service: planner-api-service

  postgres:
    container_name: planner-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-planner}
      POSTGRES_DB: ${POSTGRES_DB:-planner}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-planner}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Dev-only database admin UI, reachable at db.planner.local. Logs in without a
  # master password (desktop mode) and auto-registers the Planner server.
  pgadmin:
    container_name: planner-pgadmin
    image: dpage/pgadmin4:latest
    profiles: [debug]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@planner.example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_CONFIG_PROXY_X_FOR_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_PROTO_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: 1
      PGADMIN_CONFIG_PREFERRED_URL_SCHEME: '"https"'
    volumes:
      - pgadmin:/var/lib/pgadmin
      - ./.docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks: [default, proxy]
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      traefik.enable: true
      traefik.http.routers.planner-pgadmin-router.rule: Host(`db.planner.local`)
      traefik.http.routers.planner-pgadmin-router.entrypoints: websecure
      traefik.http.routers.planner-pgadmin-router.tls: true
      traefik.http.routers.planner-pgadmin-router.service: planner-pgadmin-service
      traefik.http.routers.planner-pgadmin-router.middlewares: pgadmin-proto@docker
      traefik.http.services.planner-pgadmin-service.loadbalancer.server.port: 80
      traefik.http.middlewares.pgadmin-proto.headers.customRequestHeaders.X-Forwarded-Proto: https

  redis:
    container_name: planner-redis
    image: redis:7-alpine
    command: redis-server /etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-planner}
    volumes:
      - ./.docker/redis/redis.conf:/etc/redis/redis.conf:ro
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-planner}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-planner}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  pgadmin:

networks:
  proxy:
    external: true
