services:
  app:
    build:
      context: .
      dockerfile: .docker/app/Dockerfile
      target: production
    image: ghcr.io/thiagobraga/planner-app:${IMAGE_TAG:-latest}
    container_name: planner-prod-app
    # `edge` is a non-internal bridge: Docker cannot publish ports for a
    # container attached only to internal networks. Host nginx reverse-proxies
    # to the published port below and terminates TLS.
    networks: [edge, backend]
    ports:
      - "127.0.0.1:8080:80"
    read_only: true
    # tmpfs mounts default to root:root, which the unprivileged nginx user
    # cannot write to; uid/gid 101 is nginx in the base image.
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, CHOWN, SETUID, SETGID]
    security_opt: [no-new-privileges:true]
    restart: unless-stopped
    healthcheck:
      # `localhost` resolves to ::1 first on musl (Alpine); nginx only binds
      # IPv4, so that lookup order made this healthcheck always fail.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: .docker/api/Dockerfile
      target: production
    image: ghcr.io/thiagobraga/planner-api:${IMAGE_TAG:-latest}
    container_name: planner-prod-api
    # backend reaches app, data reaches postgres/redis, egress is the only
    # route out to the internet (Resend). backend/data stay internal so
    # nothing else on the stack gets outbound access.
    networks: [backend, data, egress]
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      DATABASE_URL_FILE: /run/secrets/database_url
      REDIS_URL_FILE: /run/secrets/redis_url
      CSRF_SECRET_FILE: /run/secrets/csrf_secret
      RESEND_API_KEY_FILE: /run/secrets/resend_api_key
      EMAIL_FROM: ${EMAIL_FROM:-noreply@planner.thiagobraga.dev}
      SESSION_IDLE_TTL_MINUTES: ${SESSION_IDLE_TTL_MINUTES:-30}
      SESSION_ABSOLUTE_TTL_HOURS: ${SESSION_ABSOLUTE_TTL_HOURS:-12}
    secrets:
      - database_url
      - redis_url
      - csrf_secret
      - resend_api_key
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, NET_RAW]
    security_opt: [no-new-privileges:true]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: .docker/api/Dockerfile
      target: production
    image: ghcr.io/thiagobraga/planner-api:${IMAGE_TAG:-latest}
    container_name: planner-prod-migrate
    networks: [data]
    environment:
      NODE_ENV: production
      DATABASE_URL_FILE: /run/secrets/database_url
      # migrate.js imports config.ts, which validates every secret at module
      # load, so the migration job needs CSRF_SECRET even though it never uses it.
      CSRF_SECRET_FILE: /run/secrets/csrf_secret
    secrets:
      - database_url
      - csrf_secret
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    restart: no
    # migrate.js already invokes migrate() on import and exits non-zero on
    # failure. Importing it *and* calling migrate() ran two concurrent
    # migrations that raced each other creating schema_migrations.
    command: ["node", "dist/db/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    container_name: planner-prod-postgres
    image: postgres:16-alpine
    networks: [data]
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB_FILE: /run/secrets/postgres_db
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE, NET_BIND_SERVICE]
    security_opt: [no-new-privileges:true]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/postgres_user) -d $$(cat /run/secrets/postgres_db)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    container_name: planner-prod-redis
    image: redis:7-alpine
    networks: [data]
    # Shell form is required: the exec form does not invoke a shell, so
    # $(cat ...) would be passed to redis-server as a literal password string.
    command: ["sh", "-c", "exec redis-server --requirepass \"$$(cat /run/secrets/redis_password)\" --appendonly yes"]
    secrets:
      - redis_password
    volumes:
      - redisdata:/data
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE, NET_BIND_SERVICE]
    security_opt: [no-new-privileges:true]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$(cat /run/secrets/redis_password)\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

secrets:
  database_url:
    file: ${DATABASE_URL_FILE:-./secrets/database_url}
  redis_url:
    file: ${REDIS_URL_FILE:-./secrets/redis_url}
  csrf_secret:
    file: ${CSRF_SECRET_FILE:-./secrets/csrf_secret}
  # Must be readable by uid 1000 (the node user): a root-owned secret file
  # reads as empty and password reset emails silently stop being delivered.
  resend_api_key:
    file: ${RESEND_API_KEY_FILE:-./secrets/resend_api_key}
  postgres_user:
    file: ${POSTGRES_USER_FILE:-./secrets/postgres_user}
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:-./secrets/postgres_password}
  postgres_db:
    file: ${POSTGRES_DB_FILE:-./secrets/postgres_db}
  redis_password:
    file: ${REDIS_PASSWORD_FILE:-./secrets/redis_password}

volumes:
  pgdata:
  redisdata:

networks:
  edge:
    name: planner-prod-edge
    driver: bridge
  backend:
    name: planner-prod-backend
    driver: bridge
    internal: true
  data:
    name: planner-prod-data
    driver: bridge
    internal: true
  # Non-internal on purpose: api's only path to the internet (Resend).
  # No other service is attached to this network.
  egress:
    name: planner-prod-egress
    driver: bridge
